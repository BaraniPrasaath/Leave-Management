<div class="bg-[#f7f7f5]">
  <!-- Top Bar -->
  <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 mx-4 md:mx-10 py-5">
    
    <!-- Search -->
    <div id="Search" class="relative w-full md:w-64">
      <i
        class="fa-solid fa-magnifying-glass absolute left-2 top-1/2 -translate-y-1/2 text-gray-400"
      ></i>

      <input
        [value]="searchText()"
        type="text"
        placeholder="Search Employee"
        (input)="onSearch($event)"
        class="border rounded-md border-gray-400 text-gray-600 text-sm pl-8 pr-3 py-2 w-full"
      />
    </div>

    <!-- Filter -->
    <div class="relative w-full md:w-auto">
      <i
        class="fa-solid fa-filter absolute left-2 top-1/2 -translate-y-1/2 text-gray-400"
      ></i>

      <select
        id="filter by role"
        (input)="onFilter($event)"
        class="border border-gray-500 rounded-sm text-sm pl-8 pr-3 py-2 text-gray-500 cursor-pointer w-full md:w-auto"
      >
        <option value="">Apply Filter</option>
        <option value="HR">HR</option>
        <option value="Employee">Employee</option>
      </select>
    </div>

    <!-- Button -->
    <div class="w-full md:w-auto">
      <button
        routerLink="/employees/new"
        class="w-full md:w-auto py-2 px-4 border rounded-md text-sm text-white bg-[#0d048a91] cursor-pointer hover:bg-[#271ad391]"
      >
        + Add Employee
      </button>
    </div>
  </div>

  <!-- Employee Section -->
  <div class="min-h-[calc(100vh-70px)] flex flex-col items-center justify-center text-center bg-[#f7f7f5] md:py-10 py-5">
    
    <div class="flex flex-col w-full px-4">
      @if (filteredEmployees().length) {

        <div class="flex flex-wrap justify-center gap-4">
          @for (emp of filteredEmployees(); track emp.empId) {

            <!-- Card -->
            <div class="flex justify-center w-full sm:w-1/4 md:w-1/3 lg:w-1/4">
              <app-employee-card [emp]="emp"></app-employee-card>
            </div>

          }
        </div>

      } @else {
        <div class="text-center">
          <h1>No Employees are Found here....!</h1>
        </div>
      }
    </div>

  </div>
</div>
