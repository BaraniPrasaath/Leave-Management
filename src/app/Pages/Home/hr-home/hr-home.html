<div class="flex justify-center bg-gray-200 h-screen w-full py-10">
  <div class="flex flex-col gap-20 w-full px-20">
    <div class="flex justify-between">
      <div
        class="flex items-center justify-center bg-white w-65 h-30 rounded-lg shadow-lg hover:shadow-2xl transition duration-300"
      >
        <div class="text-center space-y-4">
          <h1 class="text-5xl">{{ totalCount() }}</h1>
          <h1 class="text-sm">Total Workers</h1>
        </div>
      </div>
      <div
        class="flex items-center justify-center bg-white w-65 h-30 rounded-lg shadow-lg hover:shadow-2xl transition duration-300"
      >
        <div class="text-center space-y-4">
          <h1 class="text-5xl">{{ empCount() }}</h1>
          <h1 class="text-sm">Number of Employees</h1>
        </div>
      </div>
      <div
        class="flex items-center justify-center bg-white w-65 h-30 rounded-lg shadow-lg hover:shadow-2xl transition duration-300"
      >
        <div class="text-center space-y-4">
          <h1 class="text-5xl">{{ hrCount() }}</h1>
          <h1 class="text-sm">Number of Managers</h1>
        </div>
      </div>
      <div
        class="flex items-center justify-center bg-white w-65 h-30 rounded-lg shadow-lg hover:shadow-2xl transition duration-300"
      >
        <div class="text-center space-y-4">
          <h1 class="text-5xl">{{ reqCount() }}</h1>
          <h1 class="text-sm">Number of Leave Requests</h1>
        </div>
      </div>
    </div>
    <div class="flex justify-center">
      <app-attendance-chart></app-attendance-chart>
    </div>
    <div class="flex justify-between"></div>
  </div>
</div>
