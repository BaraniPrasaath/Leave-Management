<div
  class="bg-white shadow-lg h-80 w-65 rounded-xl overflow-hidden hover:shadow-[0_0_8px_8px_rgba(0,0,0,0.2)] duration-500"
>
  <div class="flex flex-col justify-center h-1/2 w-full gap-2">
    <div class="flex justify-center items-center h-fit w-full">
      <div id="imageBox">
        <img [src]="profile" class="w-20 h-20 rounded-full" alt="" />
      </div>
    </div>
    <div>
      <div id="name" class="w-full">
        <h1 class="font-bold text-lg">{{ emp.empName }}</h1>
      </div>
      <div id="name" class="w-full">
        <h1 class="font-bold text-sm">{{ emp.role }}</h1>
      </div>
    </div>
  </div>
  <div>
    <div class="flex h-23 justify-center items-center">
      <div class="w-60 flex flex-col gap-2">
        <div class="flex flex-wrap justify-between">
          <h1 class="text-xs">{{ emp.deptName }}</h1>
          <h1 class="text-xs">{{ emp.email }}</h1>
        </div>
        <div class="flex justify-between">
          <h1 class="text-xs">{{ emp.designation }}</h1>
          <h1 class="text-xs">{{ emp.contactNo }}</h1>
        </div>
      </div>
    </div>
    <div class="flex h-17 items-center">
      <div class="flex gap-2">
        <div class="flex gap-2 px-2 justify-between bg-white w-35">
          <div class="flex flex-wrap bg-red-600 rounded-full w-10 h-10 justify-center items-center">
            <h1>{{ emp.sickLeaveBalance }}</h1>
          </div>
          <div class="flex flex-wrap bg-green-600 rounded-full w-10 h-10 justify-center items-center">
            <h1>{{ emp.paidLeaveBalance }}</h1>
          </div>
        </div>
        <div class="w-25 flex justify-end items-end">
          <div
            class="flex justify-end items-end text-xs w-fit cursor-pointer text-[#01003f81] hover:text-[#271ad391]"
            (click)="goToDetails(emp.empId)"
          >
            <h1>Details      ></h1>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
