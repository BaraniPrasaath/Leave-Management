<div class="p-6">

  <h2 class="text-2xl font-bold mb-4">
    Employee: {{ empName() }}
  </h2>

  @if (loading()) {
    <div class="text-center text-gray-500">Loading...</div>
  }

  @if(!leaves().length){
    <div class="text-center">
      <h1>No Any Datas are there...</h1>
    </div>
  }

  @if (!loading()) {

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

      @for (item of leaves(); track item.balanceId) {

        <div class="bg-white shadow-md rounded-xl p-4 border">

          <h3 class="text-lg font-semibold capitalize mb-2">
            {{ item.leaveType }}
          </h3>

          <p class="text-gray-600 mb-2">
            Remaining Leaves:
          </p>

          <span
            class="px-3 py-1 rounded-full text-white text-sm"
            [ngClass]="{
              'bg-green-500': item.count > 7,
              'bg-yellow-500': item.count <= 7 && item.count > 3,
              'bg-red-500': item.count <= 3
            }"
          >
            {{ item.count }}
          </span>

          <p class="text-sm text-gray-400 mt-3">
            Updated:
            {{ item.updatedDate | date:'short' }}
          </p>

        </div>

      }

    </div>

  }

</div>
