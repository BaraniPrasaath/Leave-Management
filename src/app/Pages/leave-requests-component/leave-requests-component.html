<div class="p-6">
  <h2 class="text-2xl font-bold mb-4">Leave Requests</h2>

  @if (loading()) {
    <div class="text-center text-gray-500">Loading...</div>
  }

  @if (!loading()) {
    <div class="overflow-x-auto shadow-lg rounded-xl">
      <table class="min-w-full bg-white border border-gray-200">
        <thead class="bg-gray-100 text-gray-700">
          <tr>
            <th class="p-3 text-left">Name</th>
            <th class="p-3 text-left">Leave Type</th>
            <th class="p-3 text-left">From</th>
            <th class="p-3 text-left">To</th>
            <th class="p-3 text-left">Reason</th>
          </tr>
        </thead>

        <tbody>
          @for (item of requests(); track item.leaveId) {
            <tr (click)="goToEmployee(item.empId)" class="border-t hover:bg-gray-50 cursor-pointer">
              <td class="p-3 font-medium">{{ item.empName }}</td>
              <td class="p-3 capitalize">{{ item.leaveType }}</td>
              <td class="p-3">{{ item.fromDate | date: 'shortDate' }}</td>
              <td class="p-3">{{ item.toDate | date: 'shortDate' }}</td>
              <td class="p-3 text-sm text-gray-600">{{ item.reason }}</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</div>
