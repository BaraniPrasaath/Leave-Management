<div class="flex flex-col justify-center items-center bg-[#f7f7f5d8] min-h-screen w-full">
  <!-- Header -->
  <div class="fixed w-full top-22 md:top-20 z-20 border-b border-t bg-white">
    <div
      class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 px-4 md:px-6 py-2"
    >
      <!-- Left -->
      <div class="flex items-center gap-3">
        <button
          routerLink="/employees"
          class="flex h-9 w-9 items-center justify-center rounded-md border border-[#756cf591] text-[#0d048a91] hover:bg-[#c1bdff91]"
        >
          <i class="fa-solid fa-chevron-left text-sm"></i>
        </button>
        <h1 class="text-lg md:text-2xl font-bold text-slate-800">Add Employee</h1>
      </div>

      <!-- Right -->
      <div class="flex flex-col sm:flex-row gap-2 sm:gap-3 w-full md:w-auto">
        <button
          class="w-full sm:w-auto rounded-md border px-4 py-2 text-sm border-[#756cf591] text-[#0d048a91] hover:bg-[#c1bdff91]"
          (click)="onDraft()"
        >
          Save as Draft
        </button>
        <button
          class="w-full sm:w-auto rounded-md px-4 py-2 text-sm bg-[#0d048a91] text-white hover:bg-[#4138be91]"
          (click)="onSubmit()"
        >
          Publish & Next
        </button>
      </div>
    </div>
  </div>

  <!-- Body -->
  <div class="mt-60 md:mt-0 w-full px-4">
    <div class="my-2 text-center">
      <h1 class="font-bold text-xl md:text-2xl">Fill the Details below</h1>
    </div>

    <form [formGroup]="userForm" class="flex justify-center">
      <div
        class="flex flex-col bg-white px-4 sm:px-8 md:px-12 py-6 md:py-10 rounded-lg shadow-lg w-full max-w-5xl gap-6"
      >
        <!-- Inputs -->
        <div class="flex flex-col gap-4">
          <!-- Row -->
          <div class="flex flex-col md:flex-row gap-4">
            <input
              type="text"
              formControlName="empName"
              placeholder="First Name"
              class="input w-full text-sm border border-gray-400 rounded-sm px-2 py-2"
            />
            <input
              type="text"
              formControlName="lastName"
              placeholder="Last Name"
              class="input w-full md:w-1/3 text-sm border border-gray-400 rounded-sm px-2 py-2"
            />
          </div>

          <!-- Row -->
          <div class="flex flex-col md:flex-row gap-4">
            <input
              type="email"
              formControlName="email"
              placeholder="Email"
              class="input w-full text-sm border border-gray-400 rounded-sm px-2 py-2"
            />
            <input
              type="text"
              formControlName="contactNo"
              placeholder="Contact no"
              class="input w-full md:w-1/3 text-sm border border-gray-400 rounded-sm px-2 py-2"
            />
          </div>

          <!-- Row -->
          <div class="flex flex-col md:flex-row gap-4">
            <input
              type="text"
              formControlName="deptName"
              placeholder="Department"
              class="input w-full md:w-1/3 text-sm border border-gray-400 rounded-sm px-2 py-2"
            />
            <input
              type="text"
              formControlName="designation"
              placeholder="Designation"
              class="input w-full md:w-1/3 text-sm border border-gray-400 rounded-sm px-2 py-2"
            />
            <select
              formControlName="role"
              class="input w-full md:w-1/3 text-gray-500 text-sm border border-gray-400 rounded-sm px-2 py-2"
            >
              <option value="">Select role</option>
              <option value="Hr">HR</option>
              <option value="Employee">Employee</option>
            </select>
          </div>

          <!-- Row -->
          <div class="flex flex-col md:flex-row gap-4">
            <input
              type="text"
              formControlName="userName"
              placeholder="User Name"
              class="input w-full text-sm border border-gray-400 rounded-sm px-2 py-2"
            />
            <input
              type="password"
              formControlName="password"
              placeholder="Password"
              class="input w-full md:w-1/3 text-sm border border-gray-400 rounded-sm px-2 py-2"
            />
          </div>

          <!-- Row -->
          <div class="flex flex-col md:flex-row gap-4">
            <input
              type="number"
              formControlName="sickLeaveBalance"
              placeholder="Sick Leave Balance"
              class="input w-full text-sm border border-gray-400 rounded-sm px-2 py-2"
            />
            <input
              type="number"
              formControlName="paidLeaveBalance"
              placeholder="Paid Leave Balance"
              class="input w-full md:w-1/3 text-sm border border-gray-400 rounded-sm px-2 py-2"
            />
          </div>
        </div>

        <!-- Buttons -->
        <div class="flex flex-col sm:flex-row justify-around gap-4">
          <button
            class="w-full sm:w-auto bg-[#0d048a91] text-white hover:bg-[#271ad391] rounded-sm px-4 py-2 text-sm"
            (click)="onSubmit()"
          >
            Submit
          </button>

          <button
            class="w-full sm:w-auto bg-[#0d048a91] text-white hover:bg-[#271ad391] rounded-sm px-4 py-2 text-sm"
            (click)="onClear()"
          >
            Clear
          </button>
        </div>

        <div>
          <h1 class="text-red-600 text-sm">{{ errMsg() }}</h1>
        </div>
      </div>
    </form>
  </div>
</div>
